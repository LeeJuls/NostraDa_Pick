name: Keep Alive

on:
  schedule:
    # 10분마다 실행 (Render 무료 플랜 15분 sleep 방지)
    - cron: '*/10 * * * *'
  workflow_dispatch:  # 수동 트리거 지원

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render server
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://nostrada-pick.onrender.com/ || echo "timeout")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ] 2>/dev/null; then
            echo "✅ Server is awake (HTTP $STATUS)"
          elif [ "$STATUS" = "timeout" ]; then
            echo "⏳ Server was sleeping, wake-up ping sent (cold start in progress)"
          else
            echo "⚠️ Status: $STATUS"
          fi
