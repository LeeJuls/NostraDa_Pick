name: Keep Alive

on:
  schedule:
    # 10분마다 실행 (Render 무료 플랜 15분 sleep 방지)
    - cron: '*/10 * * * *'
  workflow_dispatch:  # 수동 트리거 지원

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render server
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://nostrada-pick.onrender.com/)
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✅ Server is awake (HTTP $STATUS)"
          else
            echo "⚠️ Unexpected status: $STATUS"
          fi
